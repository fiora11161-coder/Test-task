<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Decision Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.board {
  display: flex;
  gap: 20px;
}

.column {
  flex: 1;
  background: #f4f4f4;
  padding: 10px;
  border-radius: 8px;
  min-height: 300px;
}

.column h3 { text-align: center; }

.task {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  cursor: grab;
  border-left: 5px solid gray;
}

.high { border-left-color: red; }
.medium { border-left-color: orange; }
.low { border-left-color: green; }

.controls button {
  margin-right:10px;
  padding:8px 12px;
  cursor:pointer;
}

.section { margin-top: 40px; }

.chart-container {
  width: 600px;
  height: 300px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Inbox → Decision Dashboard</h1>

<div class="board">
  <div class="column" id="backlog" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Backlog</h3>
  </div>

  <div class="column" id="inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>In Progress</h3>
  </div>

  <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Done</h3>
  </div>
</div>

<div class="section">
<h2>Analytics</h2>

<div class="controls">
<button onclick="updateChart('priority')">By Priority</button>
<button onclick="updateChart('owner')">By Owner</button>
<button onclick="updateChart('deadline')">By Deadline</button>
<button onclick="updateChart('status')">By Status</button>
<button onclick="updateChart('burndown')">Burndown</button>
<button onclick="updateChart('cfd')">CFD</button>
</div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>
</div>

<script>

// === DATA ===
const tasks = [
{id:1, title:"Fix payment receipt", priority:"HIGH", owner:"Support", deadline:"Today", status:"backlog"},
{id:2, title:"Landing cases", priority:"MEDIUM", owner:"Marketing", deadline:"May 15", status:"inprogress"},
{id:3, title:"Onboarding guide", priority:"MEDIUM", owner:"Product", deadline:"This week", status:"backlog"},
{id:4, title:"Safari bug", priority:"HIGH", owner:"Mobile", deadline:"ASAP", status:"backlog"},
{id:5, title:"NPS", priority:"LOW", owner:"Sales", deadline:"Next sprint", status:"backlog"},
{id:6, title:"CSV export", priority:"HIGH", owner:"Pilot", deadline:"Friday", status:"backlog"},
{id:7, title:"Weekly template", priority:"MEDIUM", owner:"Operations", deadline:"Next week", status:"backlog"},
{id:8, title:"Legal offer", priority:"HIGH", owner:"Legal", deadline:"Before release", status:"backlog"}
];

// === RENDER ===
function renderTasks() {
  document.querySelectorAll(".column").forEach(col => {
    col.innerHTML = `<h3>${col.id === "backlog" ? "Backlog" : col.id === "inprogress" ? "In Progress" : "Done"}</h3>`;
  });

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task " + t.priority.toLowerCase();
    div.draggable = true;
    div.id = "task-" + t.id;

    div.ondragstart = drag;

    div.innerHTML = `
      <b>${t.title}</b><br>
      ${t.priority} | ${t.owner}<br>
      ${t.deadline}
    `;

    document.getElementById(t.status).appendChild(div);
  });
}

// === DRAG DROP ===
function allowDrop(ev) { ev.preventDefault(); }

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  const el = document.getElementById(data);

  if (ev.target.classList.contains("column")) {
    ev.target.appendChild(el);

    const id = parseInt(data.split("-")[1]);
    const task = tasks.find(t => t.id === id);
    task.status = ev.target.id;

    updateChart(currentMode);
  }
}

// === CHART ===
let chart;
let currentMode = "priority";

function groupBy(field) {
  const result = {};
  tasks.forEach(t => {
    const key = t[field];
    result[key] = (result[key] || 0) + 1;
  });
  return result;
}

// === BURNDOWN ===
function buildBurndown() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === "done").length;
  const remaining = total - done;

  return {
    labels: ["Start","Now","Target"],
    values: [total, remaining, 0]
  };
}

// === CFD ===
function buildCFD() {
  const total = tasks.length;

  const backlog_now = tasks.filter(t => t.status === "backlog").length;
  const inprogress_now = tasks.filter(t => t.status === "inprogress").length;
  const done_now = tasks.filter(t => t.status === "done").length;

  return {
    labels: ["Day 1","Day 2","Day 3"],
    backlog: [total, backlog_now, backlog_now],
    inprogress: [0, inprogress_now, inprogress_now],
    done: [0, done_now, done_now]
  };
}

function updateChart(field) {
  currentMode = field;

  if (chart) chart.destroy();

  if (field === "burndown") {
    const data = buildBurndown();

    chart = new Chart(document.getElementById("chart"), {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [{
          label: "Remaining Tasks",
          data: data.values,
          tension: 0.3
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
    return;
  }

  if (field === "cfd") {
    const data = buildCFD();

    chart = new Chart(document.getElementById("chart"), {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [
          { label: "Backlog", data: data.backlog, fill: true },
          { label: "In Progress", data: data.inprogress, fill: true },
          { label: "Done", data: data.done, fill: true }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { filler: { propagate: true } }
      }
    });
    return;
  }

  const data = groupBy(field);

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: Object.keys(data),
      datasets: [{ label: "Tasks", data: Object.values(data) }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

// === INIT ===
renderTasks();
updateChart("priority");

</script>

</body>
</html>
