<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Decision Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
.section { margin-bottom: 30px; }
.card { border:1px solid #ddd; padding:10px; margin:10px 0; }
.controls button {
  margin-right:10px;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Inbox → Decision Dashboard</h1>

<p>
This system transforms unstructured communication into structured, prioritized tasks
to reduce business risk and improve execution predictability.
</p>

<div class="section">
<h2>Analytics View</h2>
<div class="controls">
<button onclick="updateChart('priority')">By Priority</button>
<button onclick="updateChart('owner')">By Owner</button>
<button onclick="updateChart('deadline')">By Deadline</button>
</div>
</div>

<div class="section">
<h2>Tasks</h2>
<div id="tasks"></div>
</div>

<div class="section">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

const tasks = [
{title:"Fix payment receipt issue", priority:"HIGH", owner:"Backend", deadline:"Today"},
{title:"Add cases to landing page", priority:"MEDIUM", owner:"Frontend", deadline:"May 15"},
{title:"Create onboarding guide", priority:"MEDIUM", owner:"Product", deadline:"This week"},
{title:"Fix Safari payment bug", priority:"HIGH", owner:"Frontend", deadline:"ASAP"},
{title:"Implement NPS", priority:"LOW", owner:"Backend", deadline:"Next sprint"},
{title:"Build CSV export", priority:"HIGH", owner:"Backend", deadline:"Friday"},
{title:"Create weekly template", priority:"MEDIUM", owner:"Operations", deadline:"Next week"},
{title:"Update legal offer", priority:"HIGH", owner:"Legal", deadline:"Before release"}
];

const container = document.getElementById("tasks");

tasks.forEach(t => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
  <b>${t.title}</b><br>
  Priority: ${t.priority}<br>
  Owner: ${t.owner}<br>
  Deadline: ${t.deadline}
  `;
  container.appendChild(div);
});

let chart;

function groupBy(field) {
  const result = {};
  tasks.forEach(t => {
    const key = t[field];
    result[key] = (result[key] || 0) + 1;
  });
  return result;
}

function updateChart(field) {

  const data = groupBy(field);
  const labels = Object.keys(data);
  const values = Object.values(data);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: "Tasks",
        data: values
      }]
    }
  });
}

updateChart('priority');

</script>

</body>
</html>
